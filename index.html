<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Pro</title>
<style>
body{font-family:Arial;background:#0f172a;color:#e5e7eb;max-width:520px;margin:auto;padding:15px}
h1{text-align:center}
.section{background:#111827;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
input,button,textarea,select{width:100%;margin:6px 0;padding:10px;border-radius:8px;border:none;font-size:14px}
button{background:#22c55e;color:white;font-weight:bold}
.total{font-weight:bold;margin-top:8px}
.small{font-size:13px;color:#9ca3af;white-space:pre-line}
.lock{opacity:0.6}
.proUnlocked{opacity:1;border:2px solid #22c55e}
.history-item{border-bottom:1px solid #1f2937;padding:6px 0}
</style>
</head>
<body>

<h1>🔥 Tracker Pro</h1>
<input type="date" id="date">

<div class="section">
<h2>🏆 Daily Score</h2>
<div id="scoreDisplay" class="total"></div>
<div id="streakDisplay" class="small"></div>
</div>

<div class="section">
<h2>🥗 Food + Macros</h2>
<input type="text" id="food" placeholder="Food">
<input type="number" id="protein" placeholder="Protein g">
<input type="number" id="carbs" placeholder="Carbs g">
<input type="number" id="fats" placeholder="Fats g">
<button onclick="addMacros()">Add</button>
<div id="macroList" class="small"></div>
<div class="total" id="macroTotal"></div>
</div>

<div class="section">
<h2>🏋️ Workout</h2>
<input type="text" id="exercise" placeholder="Exercise">
<input type="text" id="workoutSimple" placeholder="e.g. 3x8 @ 60kg">
<button onclick="addWorkout()">Add</button>
<div id="workoutList" class="small"></div>
</div>

<div class="section">
<h2>💰 Money</h2>
<input type="number" id="amount" placeholder="€">
<input type="text" id="source" placeholder="Source">
<button onclick="addMoney()">Add</button>
<div id="moneyTotal" class="total"></div>
</div>

<div class="section">
<h2>🧠 Note + Mood</h2>
<select id="mood">
<option>😐 Neutral</option>
<option>🔥 Motivated</option>
<option>😤 Tired</option>
<option>😄 Happy</option>
<option>😔 Low</option>
</select>
<textarea id="note" rows="3"></textarea>
<button onclick="saveNote()">Save</button>
<div id="noteDisplay" class="small"></div>
</div>

<div class="section">
<h2>📊 History (Last 7 Days)</h2>
<div id="historyList" class="small"></div>
</div>

<div class="section lock" id="proBox">
<h2>🔒 Pro Features</h2>
<p class="small">Unlock: Hardcore Mode (streak penalties), Weekly Report</p>
<button onclick="buyPro()">Unlock Pro (€4.99 demo)</button>
</div>

<script>
const key=(t,d)=>t+'_'+d;
const save=(k,d)=>localStorage.setItem(k,JSON.stringify(d));
const load=(k)=>JSON.parse(localStorage.getItem(k))||[];

function getDate(){ return date.value; }
function getToday(){ return new Date().toISOString().split('T')[0]; }

function addMacros(){
 let entry={food:food.value,p:+protein.value,c:+carbs.value,f:+fats.value};
 let d=load(key('m',getDate())); d.push(entry); save(key('m',getDate()),d);
 renderMacros(); updateScore(); renderHistory();
 food.value=protein.value=carbs.value=fats.value='';
}

function renderMacros(){
 let d=load(key('m',getDate()));
 let p=0,c=0,f=0;
 let list=d.map(x=>{p+=x.p;c+=x.c;f+=x.f;return `${x.food} → P:${x.p} C:${x.c} F:${x.f}`}).join('\n');
 let cal=p*4+c*4+f*9;
 macroList.innerText=list;
 macroTotal.innerText=`Total → P:${p} C:${c} F:${f} | ${cal} kcal`;
}

function addWorkout(){
 let d=load(key('w',getDate()));
 d.push(`${exercise.value} - ${workoutSimple.value}`);
 save(key('w',getDate()),d);
 workoutList.innerText=d.join('\n');
 updateScore(); renderHistory();
 exercise.value=workoutSimple.value='';
}

function addMoney(){
 let d=load(key('€',getDate()));
 d.push(+amount.value);
 save(key('€',getDate()),d);
 renderMoney(); updateScore(); renderHistory();
 amount.value=source.value='';
}

function renderMoney(){
 let d=load(key('€',getDate()));
 let total=d.reduce((a,b)=>a+b,0);
 moneyTotal.innerText=`Total: €${total}`;
}

function saveNote(){
 let data={mood:mood.value,text:note.value};
 localStorage.setItem(key('n',getDate()),JSON.stringify(data));
 renderNote(); updateScore(); renderHistory();
 note.value='';
}

function renderNote(){
 let d=JSON.parse(localStorage.getItem(key('n',getDate()))||'null');
 if(d) noteDisplay.innerText=`${d.mood}\n${d.text}`;
}

function calculateScore(d){
 let score=0;
 if(load(key('m',d)).length>0) score+=25;
 if(load(key('w',d)).length>0) score+=25;
 if(load(key('€',d)).length>0) score+=25;
 if(localStorage.getItem(key('n',d))) score+=25;
 return score;
}

function updateScore(){
 let score=calculateScore(getDate());
 scoreDisplay.innerText=`Score: ${score}/100`;
 updateStreak(score);
}

function updateStreak(score){
 let streak=+localStorage.getItem('streak')||0;
 let lastDate=localStorage.getItem('lastFullDay');
 let today=getToday();

 if(score===100 && getDate()===today){
   if(lastDate){
     let diff=(new Date(today)-new Date(lastDate))/(1000*60*60*24);
     if(diff===1){ streak++; }
     else if(diff>1){ streak=1; }
   } else { streak=1; }
   localStorage.setItem('lastFullDay',today);
   localStorage.setItem('streak',streak);
 }

 if(localStorage.getItem('pro')==='true' && score<100 && lastDate!==today){
   streak=0;
   localStorage.setItem('streak',0);
 }

 streakDisplay.innerText=`Streak: ${streak} days`;
}

function renderHistory(){
 let list='';
 for(let i=0;i<7;i++){
   let d=new Date();
   d.setDate(d.getDate()-i);
   let ds=d.toISOString().split('T')[0];
   let score=calculateScore(ds);
   list+=`<div class='history-item'>${ds} → ${score}/100</div>`;
 }
 historyList.innerHTML=list;
}

function buyPro(){
 localStorage.setItem('pro','true');
 document.getElementById('proBox').classList.remove('lock');
 document.getElementById('proBox').classList.add('proUnlocked');
 alert('Pro Unlocked (Demo)');
}

// init
date.valueAsDate=new Date();
window.onload=()=>{
 renderMacros();
 workoutList.innerText=load(key('w',getDate())).join('\n');
 renderMoney();
 renderNote();
 updateScore();
 renderHistory();
 if(localStorage.getItem('pro')==='true'){
   document.getElementById('proBox').classList.remove('lock');
   document.getElementById('proBox').classList.add('proUnlocked');
 }
}
</script>

</body>
</html>
