<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildYourself</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{
 font-family:'Inter',sans-serif;
 background:linear-gradient(180deg,#0f172a,#020617);
 color:#e5e7eb;
 max-width:520px;
 margin:auto;
 padding:15px
}

h1{
 text-align:center;
 font-weight:700;
 letter-spacing:1px;
 margin-bottom:10px
}

.section{
 background:rgba(17,24,39,0.8);
 backdrop-filter:blur(10px);
 padding:16px;
 border-radius:16px;
 margin-bottom:15px;
 box-shadow:0 8px 20px rgba(0,0,0,0.4)
}

input,button,textarea,select{
 width:100%;
 margin:6px 0;
 padding:12px;
 border-radius:10px;
 border:none;
 font-size:14px;
 background:#1f2937;
 color:#fff
}

input:focus,textarea:focus,select:focus{
 outline:2px solid #22c55e
}

button{
 background:linear-gradient(135deg,#22c55e,#16a34a);
 font-weight:600;
 transition:0.2s
}

button:hover{
 transform:scale(1.02);
}

.total{font-weight:700;margin-top:8px}
.small{font-size:13px;color:#9ca3af;white-space:pre-line}

.tabs{
 display:flex;
 gap:6px;
 margin-bottom:12px
}

.tab{
 flex:1;
 text-align:center;
 padding:10px;
 border-radius:12px;
 background:#1f2937;
 cursor:pointer;
 transition:0.2s
}

.tab.active{
 background:linear-gradient(135deg,#22c55e,#16a34a);
 box-shadow:0 4px 12px rgba(34,197,94,0.4)
}

.hidden{display:none}

.history-item{
 display:flex;
 justify-content:space-between;
 padding:6px 0;
 border-bottom:1px solid #1f2937
}

.score-good{color:#22c55e}
.score-mid{color:#facc15}
.score-bad{color:#ef4444}

</style>
</head>
<body>

<h1>BuildYourself</h1>
<input type="date" id="date">

<div class="section">
<h2>🏆 Daily Score</h2>
<div id="scoreDisplay" class="total"></div>
<div id="streakDisplay" class="small"></div>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab('foodTab',this)">🍽</div>
<div class="tab" onclick="showTab('workoutTab',this)">🏋️</div>
<div class="tab" onclick="showTab('moodTab',this)">🧠</div>
</div>

<div id="foodTab" class="section">
<input type="text" id="food" placeholder="Food">
<input type="number" id="protein" placeholder="Protein g">
<input type="number" id="carbs" placeholder="Carbs g">
<input type="number" id="fats" placeholder="Fats g">
<button onclick="addMacros()">Add</button>
<div id="macroList" class="small"></div>
<div id="macroTotal" class="total"></div>
</div>

<div id="workoutTab" class="section hidden">
<input type="text" id="exercise" placeholder="Exercise">
<input type="text" id="workoutSimple" placeholder="3x8 @ 60kg">
<button onclick="addWorkout()">Add</button>
<div id="workoutList" class="small"></div>
</div>

<div id="moodTab" class="section hidden">
<select id="mood">
<option>😐 Neutral</option>
<option>🔥 Motivated</option>
<option>😤 Tired</option>
<option>😄 Happy</option>
<option>😔 Low</option>
</select>
<textarea id="note" rows="3" placeholder="Your day..."></textarea>
<button onclick="saveNote()">Save</button>
<div id="noteDisplay" class="small"></div>
</div>

<div class="section">
<input type="number" id="amount" placeholder="€">
<input type="text" id="source" placeholder="Source">
<button onclick="addMoney()">Add</button>
<div id="moneyTotal" class="total"></div>
</div>

<div class="section">
<h2>📊 History</h2>
<div id="historyList"></div>
</div>

<script>
const key=(t,d)=>t+'_'+d;
const save=(k,d)=>localStorage.setItem(k,JSON.stringify(d));
const load=(k)=>JSON.parse(localStorage.getItem(k))||[];

function showTab(id,el){
 document.querySelectorAll('.section').forEach(s=>{if(s.id) s.classList.add('hidden')});
 document.getElementById(id).classList.remove('hidden');
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 el.classList.add('active');
}

function getDate(){return date.value}
function getToday(){return new Date().toISOString().split('T')[0]}

function addMacros(){
 let d=load(key('m',getDate()));
 d.push({food:food.value,p:+protein.value,c:+carbs.value,f:+fats.value});
 save(key('m',getDate()),d);
 renderMacros();updateScore();renderHistory();
 food.value=protein.value=carbs.value=fats.value='';
}

function renderMacros(){
 let d=load(key('m',getDate()));
 let p=0,c=0,f=0;
 let list=d.map(x=>{p+=x.p;c+=x.c;f+=x.f;return `${x.food} → P:${x.p} C:${x.c} F:${x.f}`}).join('\n');
 let cal=p*4+c*4+f*9;
 macroList.innerText=list;
 macroTotal.innerText=`${cal} kcal`;
}

function addWorkout(){
 let d=load(key('w',getDate()));
 d.push(`${exercise.value} - ${workoutSimple.value}`);
 save(key('w',getDate()),d);
 workoutList.innerText=d.join('\n');
 updateScore();renderHistory();
}

function addMoney(){
 let d=load(key('€',getDate()));
 d.push(+amount.value);
 save(key('€',getDate()),d);
 let total=d.reduce((a,b)=>a+b,0);
 moneyTotal.innerText=`€${total}`;
 updateScore();renderHistory();
}

function saveNote(){
 localStorage.setItem(key('n',getDate()),JSON.stringify({mood:mood.value,text:note.value}));
 renderNote();updateScore();renderHistory();
 note.value='';
}

function renderNote(){
 let d=JSON.parse(localStorage.getItem(key('n',getDate()))||'null');
 if(d) noteDisplay.innerText=`${d.mood}\n${d.text}`;
}

function calculateScore(d){
 let s=0;
 if(load(key('m',d)).length) s+=25;
 if(load(key('w',d)).length) s+=25;
 if(load(key('€',d)).length) s+=25;
 if(localStorage.getItem(key('n',d))) s+=25;
 return s;
}

function updateScore(){
 let s=calculateScore(getDate());
 scoreDisplay.innerText=`Score: ${s}/100`;
 updateStreak(s);
}

function updateStreak(score){
 let streak=+localStorage.getItem('streak')||0;
 let last=localStorage.getItem('lastFullDay');
 let today=getToday();
 if(score===100 && getDate()===today){
  if(last){
   let diff=(new Date(today)-new Date(last))/(1000*60*60*24);
   if(diff===1) streak++; else if(diff>1) streak=1;
  } else streak=1;
  localStorage.setItem('lastFullDay',today);
  localStorage.setItem('streak',streak);
 }
 streakDisplay.innerText=`Streak: ${streak}`;
}

function renderHistory(){
 let html='';
 for(let i=0;i<7;i++){
  let d=new Date(); d.setDate(d.getDate()-i);
  let ds=d.toISOString().split('T')[0];
  let s=calculateScore(ds);
  let cls=s===100?'score-good':s>=50?'score-mid':'score-bad';
  html+=`<div class='history-item'><span>${ds}</span><span class='${cls}'>${s}</span></div>`;
 }
 historyList.innerHTML=html;
}

// init
date.valueAsDate=new Date();
window.onload=()=>{
 renderMacros();
 workoutList.innerText=load(key('w',getDate())).join('\n');
 renderNote();
 updateScore();
 renderHistory();
}
</script>

</body>
</html>
